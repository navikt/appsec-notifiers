name: Build and deploy main
on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"

jobs:
  naisteamnotifier:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: nais/docker-build-push@05dbb6091b30bd84279c6d64a45ef8782fd410a5
        id: docker-build-push
        name: Build and push Docker image
        with:
          team: appsec
          image_suffix: naisteam
          pull: true
          build_args: |
            APP=naisteamnotifier
      - uses: nais/deploy/actions/deploy@5fdd91aaf69bb0d6dd5e5118cdacb639f487b93b
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/naisteamnotifier.yaml
          IMAGE: ${{ steps.docker-build-push.outputs.IMAGE }}
  secretsnotifier:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: nais/docker-build-push@05dbb6091b30bd84279c6d64a45ef8782fd410a5
        id: docker-build-push
        name: Build and push Docker image
        with:
          team: appsec
          image_suffix: secrets
          pull: true
          build_args: |
            APP=secretsnotifier
      - uses: nais/deploy/actions/deploy@5fdd91aaf69bb0d6dd5e5118cdacb639f487b93b
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/secretsnotifier.yaml
          IMAGE: ${{ steps.docker-build-push.outputs.IMAGE }}