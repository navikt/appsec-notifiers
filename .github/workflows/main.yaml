name: Build and deploy main
on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"

jobs:
  naisteamnotifier:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: nais/docker-build-push@751a312f0803eb96a05a41fadf51be19b7be362c
        id: docker-build-push
        name: Build and push Docker image
        with:
          team: appsec
          image_suffix: naisteam
          pull: true
          build_args: |
            APP=naisteamnotifier
      - uses: nais/deploy/actions/deploy@a7f8690f9b367fcbf5348a0a1e21d44f1aae50eb
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/naisteamnotifier.yaml
          IMAGE: ${{ steps.docker-build-push.outputs.IMAGE }}
  secretsnotifier:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: nais/docker-build-push@751a312f0803eb96a05a41fadf51be19b7be362c
        id: docker-build-push
        name: Build and push Docker image
        with:
          team: appsec
          image_suffix: secrets
          pull: true
          build_args: |
            APP=secretsnotifier
      - uses: nais/deploy/actions/deploy@a7f8690f9b367fcbf5348a0a1e21d44f1aae50eb
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/secretsnotifier.yaml
          IMAGE: ${{ steps.docker-build-push.outputs.IMAGE }}