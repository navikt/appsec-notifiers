name: Build and deploy main
on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"

jobs:
  naisteamnotifier:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: nais/docker-build-push@f8bc7437f7549c2b08197152d781b98f8727a08a
        id: docker-build-push
        name: Build and push Docker image
        with:
          team: appsec
          image_suffix: naisteam
          pull: true
          build_args: |
            APP=naisteamnotifier
      - uses: nais/deploy/actions/deploy@a7f8690f9b367fcbf5348a0a1e21d44f1aae50eb
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/naisteamnotifier.yaml
          IMAGE: ${{ steps.docker-build-push.outputs.IMAGE }}
  secretsnotifier:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: nais/docker-build-push@f8bc7437f7549c2b08197152d781b98f8727a08a
        id: docker-build-push
        name: Build and push Docker image
        with:
          team: appsec
          image_suffix: secrets
          pull: true
          build_args: |
            APP=secretsnotifier
      - uses: nais/deploy/actions/deploy@a7f8690f9b367fcbf5348a0a1e21d44f1aae50eb
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/secretsnotifier.yaml
          IMAGE: ${{ steps.docker-build-push.outputs.IMAGE }}